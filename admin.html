<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
   body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#000000,#1a1a1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
}

h2{
margin-bottom:25px;
font-size:28px;
}

input{
width:260px;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
font-size:14px;
outline:none;
}

input:focus{
border:1px solid #ff4d6d;
}

button{
width:260px;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff4d6d,#ff7a18);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:#111;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.login-card h2{
margin-bottom:25px;
}

.login-card input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#222;
color:white;
}

.login-card button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff4d6d,#ff7a18);
color:white;
font-size:16px;
cursor:pointer;
}

.login-card button:hover{
transform:scale(1.05);
}

.successPopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px 30px;
border-radius:10px;
color:white;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
z-index:9999;
animation:slideDown 0.4s ease;
}

.successPopup h3{
margin:0;
color:#ff4d6d;
}

.successPopup p{
margin-top:5px;
opacity:0.8;
}

@keyframes slideDown{

from{
opacity:0;
transform:translate(-50%,-20px);
}

to{
opacity:1;
transform:translate(-50%,0);
}

}

  </style>
</head>
<body>

   <div class="admin-container">

<div class="admin-card">

<div class="login-container">

<div class="login-card">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>



<script>

function login() {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

fetch("http://127.0.0.1:5000/api/admin/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ email, password })
})
.then(res => res.json())
.then(data => {

if(data.token){

localStorage.setItem("token", data.token);

showSuccessPopup();

setTimeout(()=>{
window.location.href="dashboard.html";
},2000);

}

});

}
function loadAdminShayari() {
  fetch("http://127.0.0.1:5000/api/shayari")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("adminList");
      list.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.innerHTML = `
          <p>${item.text}</p>
          <button onclick="editShayari('${item._id}', \`${item.text}\`)">Edit</button>
          <button onclick="deleteShayari('${item._id}')">Delete</button>
          <hr>
        `;
        list.appendChild(div);
      });
    });
}

function addShayari() {
  const text = document.getElementById("shayariText").value;

  fetch("http://127.0.0.1:5000/api/shayari", {
    method: "POST",
    headers: { "Content-Type": "application/json","x-access-token": localStorage.getItem("token") },
    body: JSON.stringify({ text })
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("shayariText").value = "";
    loadAdminShayari();
  });
}

function deleteShayari(id) {
  fetch(`http://127.0.0.1:5000/api/shayari/${id}`, {
    method: "DELETE",
    headers: {
      "x-access-token": localStorage.getItem("token")
    }
  })
  .then(res => res.json())
  .then(() => loadAdminShayari());
}

function editShayari(id, oldText) {
  const newText = prompt("Edit Shayari:", oldText);
  if (!newText) return;

  fetch(`http://127.0.0.1:5000/api/shayari/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" , "x-access-token": localStorage.getItem("token")},
    body: JSON.stringify({ text: newText })
  })
  .then(res => res.json())
  .then(() => loadAdminShayari());
}

loadAdminShayari();


function showSuccessPopup(){

const popup=document.createElement("div");

popup.className="successPopup";

popup.innerHTML=`
<h3>Welcome Zoya Kashyap ❤️</h3>
<p>Login Successful</p>
`;

document.body.appendChild(popup);

setTimeout(()=>{
popup.remove();
},2000);

}
</script>

</body>
</html>
